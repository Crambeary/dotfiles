# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change command timeout from 500 to 1000 ms
command_timeout = 1000

[cmake]
disabled = true

# Change the default prompt format
# ---
# old config ...
# format = """\
# [â•­â•´](238)$env_var \
# $all[â•°â”€îھœ](238)$character"""

# new config
# format = """$env_var $all"""

# Change the default prompt characters
[character]
# old config
# success_symbol = "[ï•“](238)"
# error_symbol = "[ï•“](238)"
success_symbol = ""
error_symbol = ""

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](white)'
variable = "STARSHIP_DISTRO"
disabled = true

# Shows the username
[username]
style_user = "white"
style_root = "white"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 1
truncation_symbol = "â€¦/"
home_symbol = "î¬† ~"
read_only_style = "197"
read_only = " ï€£ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "ïگک "
format = "via [$symbol$branch]($style) "
# truncation_length = 4
truncation_symbol = "â€¦/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "ًںڈ³"
up_to_date = "ïپ† "
untracked = "ï”© "
ahead = "â‡،${count}"
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count}"
behind = "â‡£${count}"
stashed = "َ°†¼ "
modified = "ïپ„ "
staged = '[++\($count\)](green)'
renamed = "î«  "
deleted = "ï€” "

[kubernetes]
format = 'via [ï´± $context\($namespace\)](bold purple) '
disabled = false

# (deactivated because of no space left)
# 
[terraform]
format = "via [ï„µ terraform $version]($style) ï„µ  [$workspace]($style) "
disabled = true

[vagrant]
format = "via [ï„µ vagrant $version]($style) "
disabled = true

[docker_context]
format = "via [ïŒˆ $context](bold blue) "
disabled = true

[helm]
format = "via [ïˆڑ $version](bold purple) "
disabled = true

[python]
python_binary = "python3"
disabled = false
symbol = "ًںگچ "
format = 'via [$symbol\($virtualenv\) ]($style)'
style  = "fg:color_fg0 bg:color_blue"

[nodejs]
format = "via [î´چ $version](bold green) "
disabled = true

[ruby]
format = "via [îˆ¾ $version]($style) "
disabled = true


"$schema" = 'https://starship.rs/config-schema.json'

# Use the Gruvbox color palette
palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'


format = """
[](color_orange)$os$username
[](bg:color_yellow fg:color_orange)$directory
[](fg:color_yellow bg:color_aqua)$git_branch$git_status
[](fg:color_aqua bg:color_blue)$c$rust$golang$nodejs$php$java$kotlin$haskell$python
[](fg:color_blue bg:color_bg3)$docker_context$conda
[](fg:color_bg3 bg:color_bg1)$time
[ ](fg:color_bg1)
$line_break$character
"""

